<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>
  <defs>
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="white"/>
      <circle cx="4" cy="4" r="2" fill="#1a1a1a"/>
    </pattern>
  </defs>
  <!-- top=black, left=white, main=dots (wrong fill order) -->
  <rect x="5" y="5" width="90" height="22" fill="#1a1a1a"/>
  <rect x="5" y="27" width="28" height="68" fill="white"/>
  <rect x="33" y="27" width="62" height="68" fill="url(#dots)"/>
  <rect x="5" y="5" width="90" height="90" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="5" y1="27" x2="95" y2="27" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="33" y1="27" x2="33" y2="95" stroke="#1a1a1a" stroke-width="1.5"/>
</svg>

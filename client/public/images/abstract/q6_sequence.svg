  <!-- Arrow 1 -->
  <text x="104" y="61" font-family="Arial" font-size="22" fill="#1a1a1a" text-anchor="middle">→</text>

  <!-- Box 2: sun with very light gray interior -->
  <rect x="115" y="10" width="90" height="90" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="160" y1="33" x2="160" y2="22" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="171" y1="45.5" x2="176.5" y2="36.4" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="179" y1="55" x2="188.6" y2="55" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="171" y1="64.5" x2="176.5" y2="73.6" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="160" y1="77" x2="160" y2="88" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="149" y1="64.5" x2="143.5" y2="73.6" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="141" y1="55" x2="131.4" y2="55" stroke="#1a1a1a" stroke-width="2"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <rect width="560" height="120" fill="white"/>

  <!-- Box 1: sun with hollow (white) interior -->
  <rect x="5" y="10" width="90" height="90" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="50" y1="33" x2="50" y2="22" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="61" y1="45.5" x2="66.5" y2="36.4" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="69" y1="55" x2="78.6" y2="55" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="61" y1="64.5" x2="66.5" y2="73.6" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="50" y1="77" x2="50" y2="88" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="39" y1="64.5" x2="33.5" y2="73.6" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="31" y1="55" x2="21.4" y2="55" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="39" y1="45.5" x2="33.5" y2="36.4" stroke="#1a1a1a" stroke-width="2"/>

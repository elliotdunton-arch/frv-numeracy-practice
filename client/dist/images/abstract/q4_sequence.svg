<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <rect width="560" height="120" fill="white"/>
  <defs>
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="white"/>
      <circle cx="4" cy="4" r="2" fill="#1a1a1a"/>
    </pattern>
  </defs>

  <!-- Box 1: top=black, left=dots, main=white -->
  <rect x="5" y="10" width="90" height="22" fill="#1a1a1a"/>
  <rect x="5" y="32" width="28" height="68" fill="url(#dots)"/>
  <rect x="33" y="32" width="62" height="68" fill="white"/>
  <rect x="5" y="10" width="90" height="90" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="5" y1="32" x2="95" y2="32" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="33" y1="32" x2="33" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Arrow 1 -->
  <text x="104" y="61" font-family="Arial" font-size="22" fill="#1a1a1a" text-anchor="middle">→</text>

  <!-- Box 2: top=dots, left=white, main=black -->
  <rect x="115" y="10" width="90" height="22" fill="url(#dots)"/>
  <rect x="115" y="32" width="28" height="68" fill="white"/>
  <rect x="143" y="32" width="62" height="68" fill="#1a1a1a"/>
  <rect x="115" y="10" width="90" height="90" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="115" y1="32" x2="205" y2="32" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="143" y1="32" x2="143" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Arrow 2 -->
  <text x="214" y="61" font-family="Arial" font-size="22" fill="#1a1a1a" text-anchor="middle">→</text>

  <!-- Box 3: top=white, left=black, main=dots -->
  <rect x="225" y="10" width="90" height="22" fill="white"/>
  <rect x="225" y="32" width="28" height="68" fill="#1a1a1a"/>
  <rect x="253" y="32" width="62" height="68" fill="url(#dots)"/>
  <rect x="225" y="10" width="90" height="90" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="225" y1="32" x2="315" y2="32" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="253" y1="32" x2="253" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Arrow 3 -->
  <text x="324" y="61" font-family="Arial" font-size="22" fill="#1a1a1a" text-anchor="middle">→</text>

  <!-- Box 4: top=black, left=dots, main=white (cycle repeats) -->
  <rect x="335" y="10" width="90" height="22" fill="#1a1a1a"/>
  <rect x="335" y="32" width="28" height="68" fill="url(#dots)"/>
  <rect x="363" y="32" width="62" height="68" fill="white"/>
  <rect x="335" y="10" width="90" height="90" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="335" y1="32" x2="425" y2="32" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="363" y1="32" x2="363" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Arrow 4 -->
  <text x="434" y="61" font-family="Arial" font-size="22" fill="#1a1a1a" text-anchor="middle">→</text>

  <!-- Question mark -->
  <text x="490" y="68" font-family="Arial" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle">?</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <rect width="560" height="120" fill="white"/>

  <!-- Box 1: dot at outer ring, top-right -->
  <rect x="5" y="10" width="90" height="90" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="50" cy="55" r="38" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="50" cy="55" r="25" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="50" cy="55" r="11" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="50" y1="17" x2="50" y2="93" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="12" y1="55" x2="88" y2="55" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="72" cy="33" r="5" fill="#1a1a1a"/>

  <!-- Arrow 1 -->
  <text x="104" y="61" font-family="Arial" font-size="22" fill="#1a1a1a" text-anchor="middle">→</text>

  <!-- Box 2: dot at outer ring, bottom-left -->
  <rect x="115" y="10" width="90" height="90" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="160" cy="55" r="38" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

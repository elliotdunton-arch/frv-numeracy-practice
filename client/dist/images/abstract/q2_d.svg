  </defs>
  <!-- petal W black — wrong (wrong direction from SE) -->
  <g transform="translate(50,50)">
    <use href="#sp0" fill="#d0d0d0" stroke="#999" stroke-width="0.5"/>
    <use href="#sp1" fill="#d0d0d0" stroke="#999" stroke-width="0.5"/>
    <use href="#sp2" fill="#d0d0d0" stroke="#999" stroke-width="0.5"/>
    <use href="#sp3" fill="#d0d0d0" stroke="#999" stroke-width="0.5"/>
    <use href="#sp4" fill="#d0d0d0" stroke="#999" stroke-width="0.5"/>
    <use href="#sp5" fill="#d0d0d0" stroke="#999" stroke-width="0.5"/>
    <use href="#sp7" fill="#d0d0d0" stroke="#999" stroke-width="0.5"/>
    <use href="#sp6" fill="#1a1a1a"/>
    <circle r="5" fill="#1a1a1a"/>
  </g>
</svg>
